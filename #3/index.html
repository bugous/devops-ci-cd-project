<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,500;1,14..32,500&display=swap" rel="stylesheet">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons & Cursors</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<body>
    <button class="primary" disabled>
        Disabled
    </button>

    <button class="primary loading">
        <i class="ph ph-circle-notch"></i>
        Loading Primary
    </button>

    <button class="primary movable">
        <i class="ph ph-list"></i>
        Movable Primary
    </button>

    <button class="secondary">
        Secondary
    </button>

    <button class="tertiary">
        Tertiary
    </button>

</body>
</html>
